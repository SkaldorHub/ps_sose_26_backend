openapi: "3.0.3"
info:
  title: GeoGuesser Backend API
  version: "0.1.0"

tags:
  - name: Auth
  - name: Lobby
  - name: Round
  - name: Guess
  - name: Results

security:
  - bearerAuth: []

paths:
  # ──────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register
      responses:
        "201": { description: Created }
        "400": { description: Username or Password invalid }
        "405": { description: User is already logged in }

  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login
      responses:
        "202": { description: Login successful }
        "401": { description: Wrong credentials }

  /auth/logout:
    post:
      tags: [Auth]
      security: []
      summary: Logout
      responses:
        "202": { description: Logout successful }
        "405": { description: No User is logged in }

  # ──────────────────────────────────────────
  # Lobby / Game Management
  # ──────────────────────────────────────────
  /games:
    post:
      tags: [Lobby]
      summary: Spiel erstellen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /games/join:
    post:
      tags: [Lobby]
      summary: Spiel per Code beitreten
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinGameRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Code ungültig
        "409":
          description: Spiel bereits gestartet oder voll

  /games/{gameId}:
    get:
      tags: [Lobby]
      summary: Spielstatus abrufen
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Not Found

  /games/{gameId}/start:
    post:
      tags: [Lobby]
      summary: Spiel starten
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Nicht der Host
        "409":
          description: Zu wenige Spieler oder bereits gestartet

  /games/{gameId}/leave:
    post:
      tags: [Lobby]
      summary: Spiel verlassen
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        "204": { description: No Content }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Not Found

  /games/{gameId}/players:
    get:
      tags: [Lobby]
      summary: Spielerliste abrufen
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Player'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Not Found

  /games/{gameId}/players/{playerId}:
    delete:
      tags: [Lobby]
      summary: Spieler kicken
      parameters:
        - $ref: '#/components/parameters/GameId'
        - name: playerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204": { description: No Content }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Nicht der Host
        "404":
          description: Not Found
        "409":
          description: Spiel bereits gestartet

  /games/{gameId}/teams:
    get:
      tags: [Lobby]
      summary: Teams anzeigen
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Not Found
  # ──────────────────────────────────────────
  # Round / Upload Phase
  # ──────────────────────────────────────────
  /games/{gameId}/current:
    get:
      tags: [Round]
      summary: Aktuelle Runde abrufen
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  roundNumber: { type: integer, example: 1 }
                  uploadDeadline: { type: string, format: date-time }

  /games/{gameId}/current/photo:
    post:
      tags: [Round]
      summary: Foto hochladen
      parameters:
        - $ref: '#/components/parameters/GameId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        "201": { description: Photo uploaded successfully }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'
        "410": { description: Upload time expired }

    put:
      tags: [Round]
      summary: Foto ersetzen
      parameters:
        - $ref: '#/components/parameters/GameId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        "200": { description: Photo replaced successfully }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "410": { description: Upload time expired }

    delete:
      tags: [Round]
      summary: Foto löschen
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        "204": { description: Photo deleted successfully }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "410": { description: Upload time expired }

  /games/{gameId}/current/status:
    get:
      tags: [Round]
      summary: Upload-Status beider Fotografen
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  teamA: { type: string, enum: [uploaded, pending] }
                  teamB: { type: string, enum: [uploaded, pending] }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────────
  # Guess Phase
  # ──────────────────────────────────────────
  /games/{gameId}/current/photo/{teamId}:
    get:
      tags: [Guess]
      summary: Gegnerisches Foto abrufen
      responses:
        "200": { description: OK }
        "403": { description: Forbidden. Player is not authorized to do this (now) }

  /games/{gameId}/current/guess:
    post:
      tags: [Guess]
      summary: Pin setzen (lat/lng)
      responses:
        "201": { description: Created }
        "403": { description: Forbidden. Player is not authorized to do this (now) }


  /games/{gameId}/current/guesses:
    get:
      tags: [Guess]
      summary: Alle gesetzten Pins abrufen
      responses:
        "200": { description: OK }
        "403": { description: Forbidden. Player is not authorized to do this (now) }

  # ──────────────────────────────────────────
  # Evaluation & Results
  # ──────────────────────────────────────────
  /games/{gameId}/current/result:
    get:
      tags: [Results]
      summary: Rundenauswertung
      responses:
        "200": { description: OK }

  /games/{gameId}/current/leaderboard:
    get:
      tags: [Results]
      summary: Aktuelles Leaderboard
      responses:
        "200": { description: OK }

  /games/{gameId}/result:
    get:
      tags: [Results]
      summary: Endergebnis
      responses:
        "200": { description: OK }

# ──────────────────────────────────────────
# Components
# ──────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GameId:
      name: gameId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: JWT invalid
    Forbidden:
      description: No permission for action in current role or phase
    NotFound:
      description: Resource not found
    Conflict:
      description: State not currently allowed

  schemas:
    GameStatus:
      type: string
      enum: [waiting, active, finished]

    Game:
      type: object
      required: [id, code, status, hostId, totalRounds, currentRound, maxPlayers, createdAt]
      properties:
        id: { type: string, format: uuid }
        code:
          type: string
          pattern: "^[A-Z0-9]{6}$"
          example: "ABC123"
        status: { $ref: '#/components/schemas/GameStatus' }
        hostId: { type: string, format: uuid }
        totalRounds: { type: integer, example: 5 }
        currentRound: { type: integer, example: 0 }
        maxPlayers: { type: integer, example: 8 }
        createdAt: { type: string, format: date-time }
        roundDurationHours: { type: integer, example: 24 }
        photoViewSeconds: { type: integer, example: 120 }

    CreateGameRequest:
      type: object
      properties:
        totalRounds: { type: integer, minimum: 1, maximum: 10, default: 5 }
        maxPlayers:  { type: integer, minimum: 2, maximum: 16, default: 8 }
        roundDurationHours: { type: integer, minimum: 1, maximum: 336, default: 24 }
        photoViewSeconds: { type: integer, minimum: 5,  maximum: 1800,  default: 120 }

    JoinGameRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          pattern: "^[A-Z0-9]{6}$"
          example: "ABC123"

    Player:
      type: object
      required: [id, username, isHost, joinedAt]
      properties:
        id:       { type: string, format: uuid }
        username: { type: string }
        teamId:   { type: string, format: uuid, nullable: true }
        isHost:   { type: boolean }
        joinedAt: { type: string, format: date-time }

    Team:
      type: object
      required: [id, name, players, score]
      properties:
        id:   { type: string, format: uuid }
        name: { type: string, example: "Team A" }
        players:
          type: array
          items: { $ref: '#/components/schemas/Player' }
        score: { type: integer, example: 0 }
